# Локальная конфигурация nginx
# Проксирование на frontend и API контейнеры
# Healthcheck-и в docker-compose гарантируют, что upstream-ы готовы до старта nginx

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # DNS resolvers — include Docker embedded DNS and Podman host DNS
    resolver 127.0.0.11 10.89.0.1 valid=30s ipv6=off;

    # Проксирование на фронтенд
    location / {
        set $tm_frontend http://frontend:80;
        proxy_pass $tm_frontend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование API на FrankenPHP
    location /api {
        client_max_body_size 220M;
        set $tm_api http://api:8000;
        proxy_pass $tm_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Санктум csrf cookie endpoint
    location /sanctum {
        set $tm_api_sanctum http://api:8000;
        proxy_pass $tm_api_sanctum;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
