services:
  # ============================================
  # DATABASES
  # ============================================

  # MariaDB for VanillaCRM
  mariadb:
    image: mariadb:latest
    container_name: vanilla_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - crm_backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for VanillaFlow
  postgres:
    image: postgres:18
    container_name: vanilla_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - flow_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Valkey (Redis-compatible) for VanillaFlow
  valkey:
    image: valkey/valkey:latest
    container_name: vanilla_valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    networks:
      - flow_backend
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # APPLICATIONS
  # ============================================

  # VanillaCRM PHP-FPM
  vanillacrm_app:
    build:
      context: ../VanillaCRM
      dockerfile: Dockerfile
    container_name: vanilla_crm_app
    restart: unless-stopped
    environment:
      APP_NAME: AndCRM
      APP_ENV: production
      APP_KEY: ${CRM_APP_KEY}
      APP_DEBUG: false
      APP_URL: https://${CRM_DOMAIN}
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      VANILLAFLOW_API_URL: http://vanillaflow_app:9000/api/v1
      VANILLAFLOW_API_TOKEN: ${VANILLAFLOW_API_TOKEN}
    volumes:
      - ../VanillaCRM:/var/www/vanillacrm_src
      - ../VanillaCRM/storage:/var/www/vanillacrm_src/storage
      - ../VanillaCRM/wait-for-it.sh:/wait-for-it.sh:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - frontend
      - crm_backend
    expose:
      - "9000"

  # VanillaFlow Telegram Bot PHP-FPM
  vanillaflow_app:
    build:
      context: ../VanillaFlow/VanillaFlowTelegramBot
      dockerfile: Dockerfile
      target: runner
    container_name: vanilla_flow_app
    restart: unless-stopped
    environment:
      APP_NAME: VanillaFlow
      APP_ENV: production
      APP_KEY: ${FLOW_APP_KEY}
      APP_DEBUG: false
      APP_URL: https://${FLOW_DOMAIN}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_TOKEN: ${FLOW_TELEGRAM_TOKEN}
      VCRM_API_URL: https://${CRM_DOMAIN}/api
      VCRM_API_TOKEN: ${VCRM_API_TOKEN}
      CACHE_DRIVER: redis
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      NUTGRAM_LOG_CHAT_ID: ${FLOW_LOG_CHAT_ID}
    volumes:
      - ../VanillaFlow/VanillaFlowTelegramBot:/var/www/src_vanilla_flow_telegram_bot_api
      - flow_storage:/var/www/src_vanilla_flow_telegram_bot_api/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - frontend
      - flow_backend
    expose:
      - "9000"

  # ============================================
  # REVERSE PROXY & SSL
  # ============================================

  # Unified NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vanilla_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.active:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ../VanillaCRM/public:/var/www/vanillacrm_src/public:ro
      - ../VanillaCRM/storage/app/public:/var/www/vanillacrm_src/storage/app/public:ro
      - ../VanillaFlow/VanillaFlowTelegramBot/public:/var/www/src_vanilla_flow_telegram_bot_api/public:ro
      - ../VanillaFlow/VanillaFlowTelegramBot/storage/app/public:/var/www/src_vanilla_flow_telegram_bot_api/storage/app/public:ro
    depends_on:
      - vanillacrm_app
      - vanillaflow_app
    networks:
      - frontend
      - svc_web
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: vanilla_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - frontend
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

# ============================================
# VOLUMES
# ============================================
volumes:
  mariadb_data:
  postgres_data:
  valkey_data:
  flow_storage:

# ============================================
# NETWORKS
# ============================================
networks:
  frontend:
    driver: bridge
  crm_backend:
    driver: bridge
  flow_backend:
    driver: bridge
  svc_web:
    external: true
